<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал пациента - Психо-Учет</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-bold">📝 Журнал: {{ patient.full_name }}</h1>
            <a href="/" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 rounded-lg">← Назад</a>
        </div>

        <div class="mb-6">
            <button onclick="document.getElementById('addLogModal').classList.remove('hidden')" 
                    class="px-6 py-3 bg-green-600 hover:bg-green-700 rounded-lg font-bold">
                ➕ Добавить запись
            </button>
        </div>

        <div class="bg-gray-800 rounded-lg overflow-hidden">
            {% if logs %}
                {% for log in logs %}
                    <div class="p-4 border-b border-gray-700 hover:bg-gray-750">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <div class="flex items-center gap-4 mb-2">
                                    <span class="text-blue-400">👨‍⚕️ {{ log.doctor_name }}</span>
                                    <span class="text-gray-400">🕐 {{ log.created_at.strftime('%d.%m.%Y %H:%M') if log.created_at else 'Не указана' }}</span>
                                </div>
                                <p class="text-gray-300">{{ log.content }}</p>
                            </div>
                            <form action="/delete_log/{{ log.id }}" method="POST" 
                                  onsubmit="return confirm('Удалить запись?')">
                                <button type="submit" class="text-red-400 hover:text-red-300 px-3 py-1">🗑️</button>
                            </form>
                        </div>
                    </div>
                {% endfor %}
            {% else %}
                <div class="p-8 text-center text-gray-400">📭 Нет записей</div>
            {% endif %}
        </div>
    </div>

    <div id="addLogModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-lg p-8 max-w-lg w-full mx-4">
            <h2 class="text-2xl font-bold mb-6">➕ Запись для {{ patient.full_name }}</h2>
            <form action="/add_log" method="POST">
                <input type="hidden" name="patient_id" value="{{ patient.id }}">
                <div class="space-y-4">
                    <div>
                        <label class="block text-gray-400 mb-2">Врач *</label>
                        <input type="text" name="doctor_name" required 
                               class="w-full px-4 py-2 bg-gray-700 rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-2">Запись *</label>
                        <textarea name="content" required rows="5"
                                  class="w-full px-4 py-2 bg-gray-700 rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500"></textarea>
                    </div>
                </div>
                <div class="flex gap-4 mt-6">
                    <button type="submit" class="flex-1 px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg">💾 Сохранить</button>
                    <button type="button" onclick="document.getElementById('addLogModal').classList.add('hidden')" 
                            class="flex-1 px-4 py-2 bg-gray-600 hover:bg-gray-700 rounded-lg">Отмена</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
